{% extends "layout.html" %}

{% block content %}
<section class="panel narrow">
    <p class="eyebrow">Area riservata</p>
    <h1>{{ title }}</h1>
    <form method="post" action="{{ action }}" class="form">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}">
        <label>Email <input name="identificativo" type="email" required></label>
        <label>Password <input type="password" name="password" required></label>
        <button>Entra</button>
    </form>
    <div class="muted"><a href="/register/">Crea un account cliente</a></div>
</section>
{% endblock %}
